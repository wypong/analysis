<div class="para">A sequence <span class="process-math">\((x_n)\)</span> is <dfn class="terminology">Cauchy sequence</dfn> if for every <span class="process-math">\(\varepsilon&gt;0\)</span> there exists <span class="process-math">\(N\in\N\)</span> such that</div>
<div class="displaymath process-math">
\begin{equation*}
|x_n-x_m|&lt;\varepsilon \quad\text{whenever } n,m\ge N.
\end{equation*}
</div>
