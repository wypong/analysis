<div class="displaymath process-math">
\begin{equation*}
\|f\|_S := \sup\{|f(x)| : x \in S\}.
\end{equation*}
</div>
<div class="para">When the set <span class="process-math">\(S\)</span> is understood, we simply write <span class="process-math">\(\|f\|\text{.}\)</span>
