<h3 class="heading"><span class="type">Paragraph</span></h3>
<div class="para">For an ordered set, the <dfn class="terminology">least upper bound property</dfn>  means: every non-empty subset that is bounded above has a least upper bound (that is, a supremum) in the set. So the completeness axiom says that <span class="process-math">\(\R\text{,}\)</span> with its usual order, has the least upper bound property.<div class="autopermalink" data-description="Paragraph"><a href="#sec-completeness-axiom-2-3" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
