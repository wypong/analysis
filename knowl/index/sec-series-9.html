<div class="para">A series <span class="process-math">\(\sum x_n\)</span> is <dfn class="terminology">absolutely convergent</dfn> if the series</div>
<div class="displaymath process-math">
\begin{equation*}
\sum |x_n|
\end{equation*}
</div>
<div class="para">converges. It is <dfn class="terminology">conditionally convergent</dfn> if <span class="process-math">\(\sum x_n\)</span> converges but <span class="process-math">\(\sum |x_n|\)</span> diverges.</div>
