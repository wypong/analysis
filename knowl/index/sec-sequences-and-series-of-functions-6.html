<div class="para">We say that <span class="process-math">\(f_n\)</span> converges <dfn class="terminology">uniformly</dfn>  on <span class="process-math">\(S\)</span> to <span class="process-math">\(f\)</span> if for every <span class="process-math">\(\varepsilon \gt 0\)</span> there exists <span class="process-math">\(N \in \N\)</span> such that</div>
<div class="displaymath process-math">
\begin{equation*}
|f_n(x)-f(x)| \lt \varepsilon
\qquad \text{for all } n \ge N \text{ and all } x \in S.
\end{equation*}
