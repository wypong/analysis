<div class="para">Because <span class="process-math">\(e^x\)</span> is a continuous bijection from the interval <span class="process-math">\(\R\)</span> onto the interval <span class="process-math">\((0,\infty)\text{,}\)</span> it has a continuous inverse by <a href="sec-continuous-functions-on-intervals.html#prop-injective-continuous-on-interval-has-continuous-inverse" class="xref" data-knowl="./knowl/xref/prop-injective-continuous-on-interval-has-continuous-inverse.html" data-reveal-label="Reveal" data-close-label="Close" title="Proposition 4.4.14">Proposition 4.4.14</a>. We call this inverse the <dfn class="terminology">natural logarithm</dfn> and write</div>
<div class="displaymath process-math" data-contains-math-knowls="./knowl/xref/prop-injective-continuous-on-interval-has-continuous-inverse.html">
\begin{equation*}
\ln \colon (0,\infty) \to \R.
\end{equation*}
