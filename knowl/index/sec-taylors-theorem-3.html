<h3 class="heading"><span class="type">Paragraph</span></h3>
<div class="para logical">
<div class="para">Let <span class="process-math">\(f\)</span> be a function with derivatives up to order <span class="process-math">\(n\)</span> near <span class="process-math">\(x_0\text{.}\)</span> The <dfn class="terminology"><span class="process-math">\(n\)</span>-th Taylor polynomial</dfn> of <span class="process-math">\(f\)</span> at <span class="process-math">\(x_0\)</span> is</div>
<div class="displaymath process-math">
\begin{equation*}
P_n(x;x_0)=\sum_{k=0}^n \frac{f^{(k)}(x_0)}{k!}(x-x_0)^k.
\end{equation*}
