<div class="para logical">
<div class="para">A <dfn class="terminology">series</dfn> is the sum of a sequence. We write</div>
<div class="displaymath process-math">
\begin{equation*}
\sum_{n=m}^k x_n
\end{equation*}
</div>
<div class="para">for the finite sum</div>
<div class="displaymath process-math">
\begin{equation*}
x_m+x_{m+1}+\cdots+x_k.
\end{equation*}
</div>
<div class="para">This is just convenient notation, but it will also guide the definition of an infinite series.</div>
