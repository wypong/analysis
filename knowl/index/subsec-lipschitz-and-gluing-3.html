<div class="para">Let <span class="process-math">\(S \subseteq \R\text{.}\)</span> A function <span class="process-math">\(f \colon S \to \R\)</span> is <dfn class="terminology">Lipschitz continuous</dfn> on <span class="process-math">\(S\)</span> if there exists <span class="process-math">\(K \gt 0\)</span> such that</div>
<div class="displaymath process-math">
\begin{equation*}
|f(x)-f(x')| \le K|x-x'|
\end{equation*}
</div>
<div class="para">for all <span class="process-math">\(x,x' \in S\text{.}\)</span>
</div>
