<h3 class="heading"><span class="type">Paragraph</span></h3>
<div class="para">A series <span class="process-math">\(\sum x_n\)</span> is called a <dfn class="terminology">Cauchy series</dfn> if its sequence of partial sums is a Cauchy sequence. By <a href="sec-cauchy-sequences.html#prop-convergent-implies-cauchy" class="xref" data-knowl="./knowl/xref/prop-convergent-implies-cauchy.html" data-reveal-label="Reveal" data-close-label="Close" title="Proposition 2.4.3">Proposition 2.4.3</a> and <a href="sec-cauchy-sequences.html#thm-sequential-completeness-of-reals" class="xref" data-knowl="./knowl/xref/thm-sequential-completeness-of-reals.html" data-reveal-label="Reveal" data-close-label="Close" title="Theorem 2.4.5">Theorem 2.4.5</a>, a series of real numbers converges if and only if it is Cauchy.<div class="autopermalink" data-description="Paragraph"><a href="#sec-convergence-tests-for-series-2-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
