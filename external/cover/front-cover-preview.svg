    </pattern>
    <clipPath id="panelClip">
      <rect x="456" y="964" width="1140" height="1270" rx="54"/>
    </clipPath>
  </defs>

  <rect width="1800" height="2700" fill="url(#paperShade)"/>
  <rect width="1800" height="2700" fill="url(#paperGrain)" opacity="0.55"/>

  <rect x="158" y="206" width="22" height="2288" rx="11" fill="#d88b38"/>
