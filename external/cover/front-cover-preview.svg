      <stop offset="1" stop-color="#0a2236"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c7721d"/>
      <stop offset="1" stop-color="#efc06d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#122638" flood-opacity="0.16"/>
    </filter>
    <pattern id="paperGrain" width="160" height="160" patternUnits="userSpaceOnUse">
