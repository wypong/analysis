<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 2700" role="img" aria-labelledby="title desc">
  <title>Analysis for Beginners cover preview</title>
  <desc>Front cover concept for a beginner-friendly analysis book by Wai Yan Pong.</desc>
  <defs>
    <linearGradient id="paperShade" x1="0" y1="0" x2="1" y2="1">
